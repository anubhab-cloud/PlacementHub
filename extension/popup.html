<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #090d1e;
      color: #fff;
      padding: 16px;
      margin: 0;
    }
    .logo {
      font-size: 14px;
      font-weight: 700;
      color: #00d4ff;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .status-box {
      background: rgba(0, 229, 160, 0.1);
      border: 1px solid rgba(0, 229, 160, 0.3);
      padding: 10px;
      border-radius: 8px;
      font-size: 11px;
      color: #00e5a0;
      margin-bottom: 12px;
    }
    .info {
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">
    🚀 PlacementHub Auto-Sync
  </div>
  <div class="status-box">
    ● Extension Active & Watching LeetCode / Codeforces
  </div>
  <div class="info">
    When you get an <strong>"Accepted"</strong> verdict on LeetCode or Codeforces, this extension automatically forwards the solution to PlacementHub to push to your GitHub repo.
  </div>
</body>
</html>
